name: Build Termux Repository

permissions:
  contents: write

on:
  push:
    paths:
      - 'packages/*/build.sh'
    branches: [master]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  build-debs:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, arm, x86_64, i686]
        include:
          - arch: aarch64
            deb_arch: aarch64
          - arch: arm
            deb_arch: arm
          - arch: x86_64
            deb_arch: x86_64
          - arch: i686
            deb_arch: i686

    steps:
      - uses: actions/checkout@v6

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y dpkg-dev wget file unzip npm nodejs python3 python3-pip make

      - name: Build .deb packages for arch=${{ matrix.arch }}
        run: |
          ARCH="${{ matrix.arch }}"
          DEB_ARCH="${{ matrix.deb_arch }}"
          mkdir -p output build_tmp

          case "$ARCH" in
            aarch64) MUSL_TRIPLE="aarch64-unknown-linux-musl"  ; GO_TRIPLE="Linux_arm64"  ; GO_TRIPLE2="linux_arm64"  ;;
            arm)     MUSL_TRIPLE="arm-unknown-linux-musleabihf"; GO_TRIPLE="Linux_armv7"  ; GO_TRIPLE2="linux_armv7"  ;;
            x86_64)  MUSL_TRIPLE="x86_64-unknown-linux-musl"   ; GO_TRIPLE="Linux_x86_64" ; GO_TRIPLE2="linux_amd64"  ;;
            i686)    MUSL_TRIPLE="i686-unknown-linux-musl"      ; GO_TRIPLE="Linux_i386"   ; GO_TRIPLE2="linux_386"    ;;
          esac

          resolve_srcurl() {
            local url="$1"
            url=$(echo "$url" \
              | sed "s|aarch64-unknown-linux-musl|$MUSL_TRIPLE|g" \
              | sed "s|arm-unknown-linux-musleabihf|$MUSL_TRIPLE|g" \
              | sed "s|x86_64-unknown-linux-musl|$MUSL_TRIPLE|g" \
              | sed "s|i686-unknown-linux-musl|$MUSL_TRIPLE|g" \
              | sed "s|Linux_arm64|$GO_TRIPLE|g" \
              | sed "s|Linux_armv7|$GO_TRIPLE|g" \
              | sed "s|Linux_x86_64|$GO_TRIPLE|g" \
              | sed "s|Linux_i386|$GO_TRIPLE|g" \
              | sed "s|linux_arm64|$GO_TRIPLE2|g" \
              | sed "s|linux_amd64|$GO_TRIPLE2|g" \
              | sed "s|linux_386|$GO_TRIPLE2|g")
            echo "$url"
          }

          elf_arch_ok() {
            local ft
            ft=$(file -b "$1" | tr '[:upper:]' '[:lower:]')
            echo "$ft" | grep -q "elf" || return 0
            local ea=""
            case "$ft" in
              *aarch64*|*arm64*)     ea="aarch64" ;;
              *arm*|*eabi*)          ea="arm"     ;;
              *x86-64*|*x86_64*)    ea="x86_64"  ;;
              *80386*|*i386*|*i686*) ea="i686"   ;;
            esac
            [ -z "$ea" ] || [ "$ea" = "$ARCH" ]
          }

          extract_archive() {
            local file="$1" dest="$2"
            local fname
            fname=$(basename "$file" | cut -d'?' -f1)
            case "$fname" in
              *.tar.gz|*.tgz) tar -xzf "$file" -C "$dest" 2>/dev/null || tar -xf "$file" -C "$dest" 2>/dev/null || true ;;
              *.tar.xz)       tar -xJf "$file" -C "$dest" 2>/dev/null || tar -xf "$file" -C "$dest" 2>/dev/null || true ;;
              *.tar.bz2)      tar -xjf "$file" -C "$dest" 2>/dev/null || tar -xf "$file" -C "$dest" 2>/dev/null || true ;;
              *.tar)          tar -xf  "$file" -C "$dest" 2>/dev/null || true ;;
              *.zip)          unzip -q "$file" -d "$dest" 2>/dev/null || true ;;
              *)              tar -xzf "$file" -C "$dest" 2>/dev/null || tar -xf "$file" -C "$dest" 2>/dev/null || true ;;
            esac
            local inner
            inner=$(find "$dest" -mindepth 1 -maxdepth 1 -type d | head -1)
            [ -n "$inner" ] && echo "$inner" || echo "$dest"
          }

          find_entrypoint() {
            local srcdir="$1" pkg="$2" bin=""
            for ext in "" ".sh" ".py" ".js" "-${ARCH}"; do
              local f="$srcdir/${pkg}${ext}"
              [ -f "$f" ] && elf_arch_ok "$f" && { bin="$f"; break; }
            done
            if [ -z "$bin" ]; then
              for name in main.sh main.py main.js index.js "${pkg}.sh" "${pkg}.py" "${pkg}.js"; do
                local f
                f=$(find "$srcdir" -maxdepth 3 -name "$name" -type f 2>/dev/null | head -1)
                [ -n "$f" ] && elf_arch_ok "$f" && { bin="$f"; break; }
              done
            fi
            if [ -z "$bin" ]; then
              while IFS= read -r f; do
                elf_arch_ok "$f" && { bin="$f"; break; }
              done < <(find "$srcdir" -maxdepth 4 -type f -perm /111 2>/dev/null)
            fi
            echo "$bin"
          }

          install_entrypoint() {
            local bin="$1" pkg="$2" prefix="$3" srcdir="$4"
            local ft
            ft=$(file -b "$bin" | tr '[:upper:]' '[:lower:]')
            if echo "$ft" | grep -q "elf"; then
              cp "$bin" "$prefix/bin/$pkg"
              chmod +x "$prefix/bin/$pkg"
              echo "  → ELF binary installed"
            else
              local sharedir="$prefix/share/$pkg"
              mkdir -p "$sharedir"
              cp -r "$srcdir"/. "$sharedir/" 2>/dev/null || true
              local relpath="${bin#$srcdir/}"
              local wrapper="$prefix/bin/$pkg"
              case "$(basename "$bin")" in
                *.py)
                  printf '#!/data/data/com.termux/files/usr/bin/bash\n' > "$wrapper"
                  printf 'cd "/data/data/com.termux/files/usr/share/%s"\n' "$pkg" >> "$wrapper"
                  printf 'exec python "%s" "$@"\n' "$relpath" >> "$wrapper"
                  ;;
                *.js)
                  printf '#!/data/data/com.termux/files/usr/bin/bash\n' > "$wrapper"
                  printf 'exec node "/data/data/com.termux/files/usr/share/%s/%s" "$@"\n' "$pkg" "$relpath" >> "$wrapper"
                  ;;
                *)
                  printf '#!/data/data/com.termux/files/usr/bin/bash\n' > "$wrapper"
                  printf 'cd "/data/data/com.termux/files/usr/share/%s"\n' "$pkg" >> "$wrapper"
                  printf 'exec bash "%s" "$@"\n' "$relpath" >> "$wrapper"
                  ;;
              esac
              chmod +x "$wrapper"
              echo "  → Script wrapper installed → share/$pkg/$relpath"
            fi
          }

          for pkg_dir in packages/*/; do
            pkg=$(basename "$pkg_dir")
            BUILD_SH="$pkg_dir/build.sh"
            [ -f "$BUILD_SH" ] || continue

            echo ""
            echo "════ [$ARCH] $pkg ════"

            unset TERMUX_PKG_VERSION TERMUX_PKG_SRCURL TERMUX_PKG_SHA256
            unset TERMUX_PKG_DESCRIPTION TERMUX_PKG_HOMEPAGE TERMUX_PKG_LICENSE
            unset TERMUX_PKG_MAINTAINER TERMUX_PKG_DEPENDS TERMUX_PKG_BUILD_IN_SRC
            unset TERMUX_PKG_PLATFORM_INDEPENDENT TERMUX_PKG_ENTRYPOINT

            eval "$(grep '^TERMUX_PKG_' "$BUILD_SH" 2>/dev/null || true)"
            VERSION="${TERMUX_PKG_VERSION:-1.0.0}"

            RAW_URL="${TERMUX_PKG_SRCURL:-}"
            RAW_URL=$(echo "$RAW_URL" \
              | sed "s|\${TERMUX_PKG_VERSION}|$VERSION|g" \
              | sed "s|\$TERMUX_PKG_VERSION|$VERSION|g")
            SRCURL=$(resolve_srcurl "$RAW_URL")

            PKG_BUILD="build_tmp/${pkg}_${ARCH}"
            TERMUX_PREFIX="$(pwd)/$PKG_BUILD/data/data/com.termux/files/usr"
            TERMUX_PKG_SRCDIR="/tmp/src_${pkg}_${ARCH}"
            mkdir -p "$PKG_BUILD/DEBIAN" "$TERMUX_PREFIX/bin" "$TERMUX_PKG_SRCDIR"

            HAS_CONTENT=false
            DOWNLOAD_OK=false

            if grep -q 'cargo build' "$BUILD_SH" 2>/dev/null; then
              echo "  SKIP: Rust build not supported in CI"
              rm -rf "$PKG_BUILD" "$TERMUX_PKG_SRCDIR"
              continue
            fi

            TMPFILE="/tmp/${pkg}_${ARCH}_src"
            if [ -n "$SRCURL" ]; then
              echo "  ↓ $SRCURL"
              if wget -q --timeout=90 --tries=3 "$SRCURL" -O "$TMPFILE" 2>/dev/null; then
                if [ -n "${TERMUX_PKG_SHA256:-}" ]; then
                  ACTUAL=$(sha256sum "$TMPFILE" | cut -d' ' -f1)
                  if [ "$ACTUAL" = "$TERMUX_PKG_SHA256" ]; then
                    echo "  ✓ SHA256 OK"
                    DOWNLOAD_OK=true
                  else
                    echo "  ⚠ SHA256 mismatch (${ACTUAL:0:16}... vs ${TERMUX_PKG_SHA256:0:16}...)"
                    if echo "$SRCURL" | grep -qE "github.com/djunekz|djunekz.github.io"; then
                      echo "  ✓ Trusted source, proceeding"
                      DOWNLOAD_OK=true
                    else
                      rm -f "$TMPFILE"
                    fi
                  fi
                else
                  DOWNLOAD_OK=true
                fi
              else
                echo "  ✗ Download failed"
              fi
            fi

            if [ "$DOWNLOAD_OK" = "true" ]; then
              FNAME=$(basename "$SRCURL" | cut -d'?' -f1)
              FILETYPE=$(file -b "$TMPFILE" | tr '[:upper:]' '[:lower:]')

              case "$FNAME" in
                *.deb)
                  DEB_ARCH_FILE=$(dpkg-deb -f "$TMPFILE" Architecture 2>/dev/null || echo "all")
                  if [ "$DEB_ARCH_FILE" = "all" ] || [ "$DEB_ARCH_FILE" = "$DEB_ARCH" ]; then
                    dpkg-deb -x "$TMPFILE" "$PKG_BUILD/" 2>/dev/null || true
                    echo "  ✓ Pre-built .deb repacked (arch: $DEB_ARCH_FILE)"
                    HAS_CONTENT=true
                  else
                    echo "  ✗ .deb arch mismatch ($DEB_ARCH_FILE ≠ $DEB_ARCH)"
                    DOWNLOAD_OK=false
                  fi
                  rm -f "$TMPFILE"
                  ;;

                *.tar.gz|*.tgz|*.tar.xz|*.tar.bz2|*.tar|*.zip)
                  SRCDIR_NEW=$(extract_archive "$TMPFILE" "$TERMUX_PKG_SRCDIR")
                  TERMUX_PKG_SRCDIR="$SRCDIR_NEW"
                  rm -f "$TMPFILE"
                  echo "  ✓ Extracted → $TERMUX_PKG_SRCDIR"
                  ;;

                *)
                  if echo "$FILETYPE" | grep -q "elf"; then
                    if elf_arch_ok "$TMPFILE"; then
                      cp "$TMPFILE" "$TERMUX_PREFIX/bin/$pkg"
                      chmod +x "$TERMUX_PREFIX/bin/$pkg"
                      HAS_CONTENT=true
                      echo "  ✓ Direct ELF binary installed"
                    else
                      echo "  ✗ ELF arch mismatch, skip"
                      DOWNLOAD_OK=false
                    fi
                    rm -f "$TMPFILE"
                  else
                    SRCDIR_NEW=$(extract_archive "$TMPFILE" "$TERMUX_PKG_SRCDIR")
                    rm -f "$TMPFILE"
                    if [ -n "$(ls -A "$TERMUX_PKG_SRCDIR" 2>/dev/null)" ]; then
                      TERMUX_PKG_SRCDIR="$SRCDIR_NEW"
                      echo "  ✓ Extracted (extensionless) → $TERMUX_PKG_SRCDIR"
                    else
                      mv "$TMPFILE" "$TERMUX_PREFIX/bin/$pkg" 2>/dev/null || true
                      chmod +x "$TERMUX_PREFIX/bin/$pkg" 2>/dev/null || true
                      HAS_CONTENT=true
                      echo "  ✓ Installed as plain file"
                    fi
                  fi
                  ;;
              esac
            fi

            if [ "$DOWNLOAD_OK" = "true" ] && [ "$HAS_CONTENT" = "false" ] \
               && grep -q '^termux_step_make()' "$BUILD_SH" 2>/dev/null; then
              echo "  → Running termux_step_make()..."
              ABSBUILD="$(pwd)/$BUILD_SH"
              bash -c "
                set +e
                source '$ABSBUILD' 2>/dev/null || true
                TERMUX_PREFIX='$TERMUX_PREFIX'
                TERMUX_PKG_SRCDIR='$TERMUX_PKG_SRCDIR'
                TERMUX_PKG_VERSION='$VERSION'
                TERMUX_ARCH='$ARCH'
                cd '$TERMUX_PKG_SRCDIR' 2>/dev/null || true
                declare -f termux_step_make >/dev/null 2>&1 && termux_step_make 2>&1 | sed 's/^/    /'
              " || true
            fi

            if [ "$DOWNLOAD_OK" = "true" ] && [ "$HAS_CONTENT" = "false" ] \
               && grep -q 'termux_step_make_install' "$BUILD_SH" 2>/dev/null; then
              echo "  → Running termux_step_make_install()..."

              PATCHED="/tmp/patched_build_${pkg}.sh"
              sed 's|pip install \(--[^ ]*\)* \([^-]\)|pip install --break-system-packages \1 \2|g;
                   s|pip install \([^-]\)|pip install --break-system-packages \1|g' \
                "$(pwd)/$BUILD_SH" > "$PATCHED"

              ABSBUILD="$PATCHED"
              bash -c "
                set +e
                source '$ABSBUILD' 2>/dev/null || true
                TERMUX_PREFIX='$TERMUX_PREFIX'
                TERMUX_PKG_SRCDIR='$TERMUX_PKG_SRCDIR'
                TERMUX_PKG_VERSION='$VERSION'
                TERMUX_ARCH='$ARCH'
                declare -f termux_step_make_install >/dev/null 2>&1 \
                  && termux_step_make_install 2>&1 | sed 's/^/    /'
              " || true
              rm -f "$PATCHED"

              if [ -f "$TERMUX_PREFIX/bin/$pkg" ]; then
                HAS_CONTENT=true
                echo "  ✓ bin/$pkg created"
              else
                FC=$(find "$PKG_BUILD/data" -type f 2>/dev/null | wc -l)
                if [ "$FC" -gt 0 ]; then
                  HAS_CONTENT=true
                  echo "  ✓ $FC file(s) installed (no bin/$pkg)"
                else
                  echo "  ✗ termux_step_make_install produced no files"
                fi
              fi
            fi

            if [ "$DOWNLOAD_OK" = "true" ] && [ "$HAS_CONTENT" = "false" ] \
               && [ -n "$(ls -A "$TERMUX_PKG_SRCDIR" 2>/dev/null)" ]; then
              echo "  → Auto-detecting entrypoint from source..."
              BIN=$(find_entrypoint "$TERMUX_PKG_SRCDIR" "$pkg")
              if [ -n "$BIN" ]; then
                install_entrypoint "$BIN" "$pkg" "$TERMUX_PREFIX" "$TERMUX_PKG_SRCDIR"
                HAS_CONTENT=true
              else
                echo "  ✗ No entrypoint found in source"
              fi
            fi

            if [ "$HAS_CONTENT" = "false" ]; then
              echo "  SKIP: Nothing packaged for $pkg [$ARCH]"
              rm -rf "$PKG_BUILD" "$TERMUX_PKG_SRCDIR"
              continue
            fi

            PKG_DESC="${TERMUX_PKG_DESCRIPTION:-$pkg}"
            PKG_HOMEPAGE="${TERMUX_PKG_HOMEPAGE:-https://github.com/djunekz/termux-app-store}"
            PKG_MAINTAINER="${TERMUX_PKG_MAINTAINER:-@termux-app-store}"
            PKG_DEPENDS="${TERMUX_PKG_DEPENDS:-}"
            PKG_DEPENDS=$(echo "$PKG_DEPENDS" \
              | sed 's/binutils-is-llvm[^,]*,\?//g; s/rust[^,]*,\?//g' \
              | sed 's/,[[:space:]]*,/,/g; s/^[[:space:],]*//; s/[[:space:],]*$//')

            INSTALLED_SIZE=$(du -sk "$PKG_BUILD/data" 2>/dev/null | cut -f1 || echo "1")

            {
              printf 'Package: %s\n'        "$pkg"
              printf 'Version: %s\n'        "$VERSION"
              printf 'Architecture: %s\n'   "$DEB_ARCH"
              printf 'Maintainer: %s\n'     "$PKG_MAINTAINER"
              printf 'Installed-Size: %s\n' "$INSTALLED_SIZE"
              printf 'Homepage: %s\n'       "$PKG_HOMEPAGE"
              printf 'Description: %s\n'    "$PKG_DESC"
            } > "$PKG_BUILD/DEBIAN/control"
            [ -n "$PKG_DEPENDS" ] && printf 'Depends: %s\n' "$PKG_DEPENDS" >> "$PKG_BUILD/DEBIAN/control"

            # ── Pack .deb ─────────────────────────────────────────────────────────
            DEB_OUT="output/${pkg}_${VERSION}_${DEB_ARCH}.deb"
            if dpkg-deb --build "$PKG_BUILD" "$DEB_OUT" 2>/dev/null; then
              echo "  ✓ $(basename "$DEB_OUT") ($(du -h "$DEB_OUT" | cut -f1))"
            else
              echo "  ✗ dpkg-deb build failed"
            fi

            rm -rf "$TERMUX_PKG_SRCDIR" "/tmp/patched_build_${pkg}.sh"
          done

          echo ""
          echo "Total .deb built for $ARCH: $(ls output/*.deb 2>/dev/null | wc -l)"

      - name: Upload artifact for ${{ matrix.arch }}
        uses: actions/upload-artifact@v4
        with:
          name: debs-${{ matrix.arch }}
          path: output/*.deb
          if-no-files-found: warn
          retention-days: 7

  publish-repo:
    needs: build-debs
    runs-on: ubuntu-latest
    steps:
      - name: Install tools
        run: sudo apt-get install -y dpkg-dev

      - name: Checkout source (to read packages/ metadata)
        uses: actions/checkout@v6
        with:
          ref: master
          path: source

      - name: Checkout gh-pages branch
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Initialize gh-pages if it does not exist
        run: |
          if [ ! -d "gh-pages/.git" ]; then
            mkdir -p gh-pages
            cd gh-pages
            git init
            git remote add origin \
              "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            git checkout --orphan gh-pages
          fi
          for arch in aarch64 arm x86_64 i686; do
            mkdir -p "gh-pages/dists/termux/main/binary-${arch}"
          done
          mkdir -p gh-pages/pool/main

      - name: Download all arch artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: debs-*
          path: all-debs/
          merge-multiple: true

      - name: Copy .deb files to pool
        run: |
          for new_deb in all-debs/*.deb; do
            [ -f "$new_deb" ] || continue
            pkgname=$(basename "$new_deb" | cut -d'_' -f1)
            rm -f "gh-pages/pool/main/${pkgname}_"*.deb 2>/dev/null || true
          done
          cp all-debs/*.deb gh-pages/pool/main/ 2>/dev/null || true
          echo "Files in pool/main ($(ls gh-pages/pool/main/*.deb 2>/dev/null | wc -l) files):"
          ls gh-pages/pool/main/

      - name: Generate Packages index per architecture
        run: |
          cd gh-pages
          FULL_PKG="/tmp/Packages_all"
          if ls pool/main/*.deb >/dev/null 2>&1; then
            dpkg-scanpackages pool/main /dev/null 2>/dev/null \
              | sed 's|^Filename: pool/main/pool/main/|Filename: pool/main/|' \
              > "$FULL_PKG"
          else
            touch "$FULL_PKG"
          fi

          for arch in aarch64 arm x86_64 i686; do
            PKGDIR="dists/termux/main/binary-${arch}"
            mkdir -p "$PKGDIR"

            awk -v arch="$arch" '
              /^$/ { if (keep) { printf "%s\n", block; } block=""; keep=0; next }
              /^Architecture:/ {
                if ($2 == arch || $2 == "all") keep=1
              }
              { block = block $0 "\n" }
              END { if (keep && block != "") printf "%s\n", block }
            ' "$FULL_PKG" > "$PKGDIR/Packages"

            rm -f "$PKGDIR/Packages.gz"
            gzip -k "$PKGDIR/Packages"
            COUNT=$(grep -c "^Package:" "$PKGDIR/Packages" 2>/dev/null || echo 0)
            echo "  [$arch] $COUNT packages indexed"
          done
          rm -f "$FULL_PKG"

      - name: Generate Release file
        run: |
          cd gh-pages
          {
            printf 'Origin: Termux App Store\n'
            printf 'Label: Termux App Store\n'
            printf 'Suite: termux\n'
            printf 'Codename: termux\n'
            printf 'Components: main\n'
            printf 'Architectures: aarch64 arm x86_64 i686\n'
            printf 'Description: Custom Termux repository by @djunekz\n'
            printf 'Date: %s\n' "$(date -u '+%a, %d %b %Y %H:%M:%S UTC')"
          } > dists/termux/Release

          cd dists/termux
          for algo in MD5Sum SHA256; do
            echo "$algo:" >> Release
            for arch in aarch64 arm x86_64 i686; do
              for f in "main/binary-${arch}/Packages" "main/binary-${arch}/Packages.gz"; do
                [ -f "$f" ] || continue
                SIZE=$(wc -c < "$f")
                if [ "$algo" = "MD5Sum" ]; then
                  HASH=$(md5sum "$f" | cut -d' ' -f1)
                else
                  HASH=$(sha256sum "$f" | cut -d' ' -f1)
                fi
                echo " $HASH $SIZE $f" >> Release
              done
            done
          done

      - name: Copy install-repo.py to gh-pages
        run: |
          cp source/install-repo.py gh-pages/install-repo.py

      - name: Write index generator script
        run: |
          cat > /tmp/gen_index.py << 'ENDOFSCRIPT'
          import sys
          total = sys.argv[1]
          pkg_rows = sys.argv[2]
          last_updated = sys.argv[3]
          print(f"""<!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Termux App Store</title>
          <style>
          *{{box-sizing:border-box;margin:0;padding:0}}
          body{{font-family:'Courier New',monospace;background:#0d1117;color:#c9d1d9;padding:24px 16px;line-height:1.6}}
          .wrap{{max-width:760px;margin:0 auto}}
          h1{{color:#58a6ff;font-size:22px;margin-bottom:4px}}
          .sub{{color:#8b949e;font-size:13px;margin-bottom:24px}}
          h2{{color:#79c0ff;font-size:12px;font-weight:bold;margin:28px 0 8px;text-transform:uppercase;letter-spacing:.08em}}
          pre{{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;overflow-x:auto;font-size:13px}}
          code{{color:#7ee787}}
          a{{color:#58a6ff;text-decoration:none}}
          a:hover{{text-decoration:underline}}
          table{{width:100%;border-collapse:collapse;font-size:13px;margin-top:4px}}
          th{{text-align:left;padding:6px 12px;color:#8b949e;border-bottom:1px solid #21262d;font-weight:normal}}
          td{{padding:5px 12px;border-bottom:1px solid #161b22}}
          td:first-child{{color:#7ee787}}
          td:nth-child(2){{color:#e3b341;min-width:80px}}
          td:nth-child(3){{color:#8b949e}}
          tr:hover td{{background:#161b22}}
          .badges{{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px}}
          .badge{{background:#1f6feb22;color:#58a6ff;border:1px solid #1f6feb55;font-size:11px;padding:2px 10px;border-radius:12px}}
          .badge.green{{background:#23863622;color:#3fb950;border-color:#23863655}}
          footer{{margin-top:48px;color:#484f58;font-size:12px;border-top:1px solid #21262d;padding-top:16px}}
          </style>
          </head>
          <body>
          <div class="wrap">
          <h1>Termux App Store</h1>
          <p class="sub">by <a href="https://github.com/djunekz">@djunekz</a> &nbsp;&middot;&nbsp;
            <a href="https://github.com/djunekz/termux-app-store">GitHub</a></p>
          <div class="badges">
            <span class="badge green">{total} packages</span>
            <span class="badge">aarch64</span><span class="badge">arm</span>
            <span class="badge">x86_64</span><span class="badge">i686</span>
          </div>
          <h2>Quick Setup</h2>
          <pre><code>curl -fsSL https://djunekz.github.io/termux-app-store/install-repo.py | python</code></pre>
          <h2>Available packages ({total})</h2>
          <table>
          <thead><tr><th>Package</th><th>Version</th><th>Description</th></tr></thead>
          <tbody>{pkg_rows}</tbody>
          </table>
          <h2>Repository links</h2>
          <pre><code>dists/termux/main/binary-aarch64/Packages
          dists/termux/main/binary-arm/Packages
          dists/termux/main/binary-x86_64/Packages
          dists/termux/main/binary-i686/Packages</code></pre>
          <footer>Last updated: {last_updated}</footer>
          </div></body></html>""")
          ENDOFSCRIPT

      - name: Collect package rows for index
        id: pkgrows
        run: |
          PKG_ROWS=""
          for pkg_dir in source/packages/*/; do
            pkg=$(basename "$pkg_dir")
            unset TERMUX_PKG_VERSION TERMUX_PKG_DESCRIPTION 2>/dev/null || true
            eval "$(grep '^TERMUX_PKG_VERSION\|^TERMUX_PKG_DESCRIPTION' "$pkg_dir/build.sh" 2>/dev/null || true)"
            V="${TERMUX_PKG_VERSION:-}"
            D="${TERMUX_PKG_DESCRIPTION:-}"
            PKG_ROWS+="<tr><td>${pkg}</td><td>${V}</td><td>${D}</td></tr>"
          done
          echo "rows=${PKG_ROWS}" >> "$GITHUB_OUTPUT"

      - name: Generate index.html
        env:
          PKG_ROWS: ${{ steps.pkgrows.outputs.rows }}
        run: |
          cd gh-pages
          TOTAL=$(grep -c "^Package:" dists/termux/main/binary-aarch64/Packages 2>/dev/null || echo 0)
          LAST_UPDATED=$(date -u '+%Y-%m-%d %H:%M UTC')
          python3 /tmp/gen_index.py "$TOTAL" "$PKG_ROWS" "$LAST_UPDATED" > index.html

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages
          git config user.email "258516621+termux-app-store@users.noreply.github.com"
          git config user.name "Termux App Store"
          git add -A
          TOTAL=$(grep -c "^Package:" dists/termux/main/binary-aarch64/Packages 2>/dev/null || echo 0)
          if git rev-parse HEAD >/dev/null 2>&1; then
            if git diff --staged --quiet; then
              echo "No changes to commit"
            else
              git commit -m "repo: $TOTAL pkgs, multi-arch [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
              git push origin HEAD:gh-pages
            fi
          else
            git commit -m "repo: $TOTAL pkgs, multi-arch [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
            git push origin HEAD:gh-pages
          fi
