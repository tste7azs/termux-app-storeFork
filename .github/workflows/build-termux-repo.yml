name: Build Termux Repository

permissions:
  contents: write

on:
  push:
    paths:
      - 'packages/*/build.sh'
    branches: [master]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  build-debs:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, arm, x86_64, i686]
        include:
          - arch: aarch64
            deb_arch: aarch64
          - arch: arm
            deb_arch: arm
          - arch: x86_64
            deb_arch: x86_64
          - arch: i686
            deb_arch: i686

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y dpkg-dev wget file unzip npm nodejs python3 python3-pip

      - name: Build .deb packages for arch=${{ matrix.arch }}
        run: |
          ARCH="${{ matrix.arch }}"
          DEB_ARCH="${{ matrix.deb_arch }}"
          mkdir -p output build_tmp

          for pkg_dir in packages/*/; do
            pkg=$(basename "$pkg_dir")
            BUILD_SH="$pkg_dir/build.sh"
            [ -f "$BUILD_SH" ] || continue
            echo "──── [$ARCH] Building: $pkg"

            unset TERMUX_PKG_VERSION TERMUX_PKG_SRCURL TERMUX_PKG_SHA256
            unset TERMUX_PKG_DESCRIPTION TERMUX_PKG_HOMEPAGE TERMUX_PKG_LICENSE
            unset TERMUX_PKG_MAINTAINER TERMUX_PKG_DEPENDS TERMUX_PKG_BUILD_IN_SRC
            unset TERMUX_PKG_PLATFORM_INDEPENDENT TERMUX_PKG_ENTRYPOINT

            export TERMUX_ARCH="$ARCH"
            eval "$(grep '^TERMUX_PKG_' "$BUILD_SH" 2>/dev/null || true)"
            VERSION="${TERMUX_PKG_VERSION:-1.0.0}"

            SRCURL="${TERMUX_PKG_SRCURL:-}"
            if [ -z "$SRCURL" ] || echo "$SRCURL" | grep -qE '\{|\$\{'; then
              RAW=$(grep 'TERMUX_PKG_SRCURL' "$BUILD_SH" | head -1 \
                | sed "s/.*TERMUX_PKG_SRCURL[[:space:]]*=[[:space:]]*//") \
                | tr -d '"' | tr -d "'")
              SRCURL=$(echo "$RAW" \
                | sed "s|\\\${TERMUX_PKG_VERSION}|$VERSION|g" \
                | sed "s|{\$TERMUX_PKG_VERSION}|$VERSION|g")
            fi

            case "$ARCH" in
              aarch64)
                SRCURL=$(echo "$SRCURL" \
                  | sed 's|x86_64-unknown-linux-musl|aarch64-unknown-linux-musl|g' \
                  | sed 's|i686-unknown-linux-musl|aarch64-unknown-linux-musl|g' \
                  | sed 's|Linux_x86_64|Linux_arm64|g' \
                  | sed 's|Linux_i386|Linux_arm64|g')
                ;;
              arm)
                SRCURL=$(echo "$SRCURL" \
                  | sed 's|aarch64-unknown-linux-musl|arm-unknown-linux-musleabihf|g' \
                  | sed 's|x86_64-unknown-linux-musl|arm-unknown-linux-musleabihf|g' \
                  | sed 's|Linux_arm64|Linux_armv7|g' \
                  | sed 's|Linux_x86_64|Linux_armv7|g')
                ;;
              x86_64)
                SRCURL=$(echo "$SRCURL" \
                  | sed 's|aarch64-unknown-linux-musl|x86_64-unknown-linux-musl|g' \
                  | sed 's|arm-unknown-linux-musleabihf|x86_64-unknown-linux-musl|g' \
                  | sed 's|Linux_arm64|Linux_x86_64|g' \
                  | sed 's|Linux_armv7|Linux_x86_64|g')
                ;;
              i686)
                SRCURL=$(echo "$SRCURL" \
                  | sed 's|aarch64-unknown-linux-musl|i686-unknown-linux-musl|g' \
                  | sed 's|arm-unknown-linux-musleabihf|i686-unknown-linux-musl|g' \
                  | sed 's|Linux_arm64|Linux_i386|g' \
                  | sed 's|Linux_armv7|Linux_i386|g')
                ;;
            esac

            PKG_BUILD="build_tmp/${pkg}_${ARCH}"
            TERMUX_PREFIX="$(pwd)/$PKG_BUILD/data/data/com.termux/files/usr"
            TERMUX_PKG_SRCDIR="/tmp/src_${pkg}_${ARCH}"
            mkdir -p "$PKG_BUILD/DEBIAN" "$TERMUX_PREFIX/bin" "$TERMUX_PKG_SRCDIR"

            HAS_BINARY=false
            DOWNLOAD_SUCCESS=false

            if [ -n "$SRCURL" ]; then
              TMPFILE="/tmp/${pkg}_${ARCH}_src"
              echo "  Downloading: $SRCURL"

              if wget -q --timeout=60 --tries=3 "$SRCURL" -O "$TMPFILE" 2>/dev/null; then

                if [ -n "${TERMUX_PKG_SHA256:-}" ]; then
                  ACTUAL=$(sha256sum "$TMPFILE" | cut -d' ' -f1)
                  if [ "$ACTUAL" != "$TERMUX_PKG_SHA256" ]; then
                    echo "  WARNING: SHA256 mismatch for $pkg"
                    echo "    Expected : $TERMUX_PKG_SHA256"
                    echo "    Got      : $ACTUAL"
                    if echo "$SRCURL" | grep -q "github.com/djunekz"; then
                      echo "  Trusted source — proceeding despite SHA256 mismatch"
                      DOWNLOAD_SUCCESS=true
                    else
                      rm -f "$TMPFILE"
                    fi
                  else
                    echo "  SHA256: OK"
                    DOWNLOAD_SUCCESS=true
                  fi
                else
                  DOWNLOAD_SUCCESS=true
                fi

                if [ "$DOWNLOAD_SUCCESS" = "true" ]; then
                  FNAME=$(basename "$SRCURL" | cut -d'?' -f1)
                  FILETYPE=$(file -b "$TMPFILE" | tr '[:upper:]' '[:lower:]')

                  case "$FNAME" in
                    *.tar.gz|*.tgz)
                      tar -xzf "$TMPFILE" -C "$TERMUX_PKG_SRCDIR" 2>/dev/null || \
                        tar -xf  "$TMPFILE" -C "$TERMUX_PKG_SRCDIR" 2>/dev/null || true
                      INNER=$(find "$TERMUX_PKG_SRCDIR" -mindepth 1 -maxdepth 1 -type d | head -1)
                      [ -n "$INNER" ] && TERMUX_PKG_SRCDIR="$INNER"
                      ;;
                    *.tar.xz)
                      tar -xJf "$TMPFILE" -C "$TERMUX_PKG_SRCDIR" 2>/dev/null || \
                        tar -xf  "$TMPFILE" -C "$TERMUX_PKG_SRCDIR" 2>/dev/null || true
                      INNER=$(find "$TERMUX_PKG_SRCDIR" -mindepth 1 -maxdepth 1 -type d | head -1)
                      [ -n "$INNER" ] && TERMUX_PKG_SRCDIR="$INNER"
                      ;;
                    *.tar.bz2)
                      tar -xjf "$TMPFILE" -C "$TERMUX_PKG_SRCDIR" 2>/dev/null || \
                        tar -xf  "$TMPFILE" -C "$TERMUX_PKG_SRCDIR" 2>/dev/null || true
                      INNER=$(find "$TERMUX_PKG_SRCDIR" -mindepth 1 -maxdepth 1 -type d | head -1)
                      [ -n "$INNER" ] && TERMUX_PKG_SRCDIR="$INNER"
                      ;;
                    *.tar)
                      tar -xf "$TMPFILE" -C "$TERMUX_PKG_SRCDIR" 2>/dev/null || true
                      INNER=$(find "$TERMUX_PKG_SRCDIR" -mindepth 1 -maxdepth 1 -type d | head -1)
                      [ -n "$INNER" ] && TERMUX_PKG_SRCDIR="$INNER"
                      ;;
                    *.zip)
                      unzip -q "$TMPFILE" -d "$TERMUX_PKG_SRCDIR" 2>/dev/null || true
                      INNER=$(find "$TERMUX_PKG_SRCDIR" -mindepth 1 -maxdepth 1 -type d | head -1)
                      [ -n "$INNER" ] && TERMUX_PKG_SRCDIR="$INNER"
                      ;;
                    *.deb)
                      DEB_PKG_ARCH=$(dpkg-deb -f "$TMPFILE" Architecture 2>/dev/null || echo "all")
                      if [ "$DEB_PKG_ARCH" = "all" ] || [ "$DEB_PKG_ARCH" = "$DEB_ARCH" ]; then
                        dpkg-deb -x "$TMPFILE" "$PKG_BUILD/" 2>/dev/null || true
                        echo "  Repacked pre-built .deb (arch: $DEB_PKG_ARCH)"
                        [ -f "$TERMUX_PREFIX/bin/$pkg" ] && HAS_BINARY=true
                      else
                        echo "  SKIP: pre-built .deb arch=$DEB_PKG_ARCH != $DEB_ARCH"
                        DOWNLOAD_SUCCESS=false
                      fi
                      ;;
                    *)
                      if echo "$FILETYPE" | grep -q "elf"; then
                        ELF_ARCH=""
                        case "$FILETYPE" in
                          *aarch64*|*arm64*)      ELF_ARCH="aarch64" ;;
                          *arm*|*eabi*)           ELF_ARCH="arm" ;;
                          *x86-64*|*x86_64*)     ELF_ARCH="x86_64" ;;
                          *80386*|*i386*|*i686*)  ELF_ARCH="i686" ;;
                        esac
                        if [ -z "$ELF_ARCH" ] || [ "$ELF_ARCH" = "$ARCH" ]; then
                          cp "$TMPFILE" "$TERMUX_PREFIX/bin/$pkg"
                          chmod +x "$TERMUX_PREFIX/bin/$pkg"
                          HAS_BINARY=true
                          echo "  Installed ELF binary (arch: ${ELF_ARCH:-unknown})"
                        else
                          echo "  SKIP: ELF arch=$ELF_ARCH != $ARCH — skipping binary, no .deb"
                          rm -f "$TMPFILE"
                          DOWNLOAD_SUCCESS=false
                          continue
                        fi
                      else
                        cp "$TMPFILE" "$TERMUX_PREFIX/bin/$pkg"
                        chmod +x "$TERMUX_PREFIX/bin/$pkg"
                        HAS_BINARY=true
                        echo "  Installed script/platform-independent"
                      fi
                      ;;
                  esac
                  rm -f "$TMPFILE"
                fi
              else
                echo "  WARNING: Download failed for $pkg"
              fi
            fi

            if grep -q 'termux_step_make_install' "$BUILD_SH" 2>/dev/null; then

              if grep -q 'cargo build' "$BUILD_SH" 2>/dev/null; then
                echo "  SKIP termux_step_make_install: butuh Rust cross-compile (pmcli)"
              else
                echo "  Running termux_step_make_install()..."

                cat > /tmp/_tas_runner.sh << 'RUNNER_EOF'
set +e
npm () {
  if [ "$1" = "install" ] || [ "$1" = "ci" ]; then
    echo "    [CI] npm $@ skipped (will run on-device)"
    return 0
  fi
  command npm "$@"
}
export -f npm

pip() {
  if [ "$1" = "install" ]; then
    shift
    command pip install "$@" \
      --target="${TERMUX_PREFIX}/lib/python3/dist-packages" \
      --no-deps --quiet 2>/dev/null || \
    command pip install "$@" --quiet 2>/dev/null || true
    return 0
  fi
  command pip "$@"
}
export -f pip

source "$BUILD_SH" 2>/dev/null || true

if declare -f termux_step_make_install > /dev/null 2>&1; then
  termux_step_make_install 2>&1 | sed 's/^/    /'
fi
RUNNER_EOF

                STEP_RESULT=0
                TERMUX_PREFIX="$TERMUX_PREFIX" \
                TERMUX_PKG_SRCDIR="$TERMUX_PKG_SRCDIR" \
                TERMUX_PKG_VERSION="$VERSION" \
                TERMUX_ARCH="$ARCH" \
                BUILD_SH="$BUILD_SH" \
                bash /tmp/_tas_runner.sh || STEP_RESULT=$?

                if [ -f "$TERMUX_PREFIX/bin/$pkg" ]; then
                  HAS_BINARY=true
                  echo "  termux_step_make_install: OK (bin/$pkg terbuat)"
                else
                  FILE_COUNT=$(find "$PKG_BUILD/data" -type f 2>/dev/null | wc -l)
                  if [ "$FILE_COUNT" -gt 0 ]; then
                    echo "  termux_step_make_install: partial — $FILE_COUNT file diinstall (tanpa bin/$pkg)"
                    HAS_BINARY=true
                  else
                    echo "  termux_step_make_install: WARNING — tidak ada file terbuat"
                  fi
                fi
              fi
            fi

            if [ "$HAS_BINARY" = "false" ] && [ "$DOWNLOAD_SUCCESS" = "true" ] \
               && [ -d "$TERMUX_PKG_SRCDIR" ] \
               && [ "$(ls -A "$TERMUX_PKG_SRCDIR" 2>/dev/null)" ]; then

              BIN=""

              while IFS= read -r c; do
                CT=$(file -b "$c" | tr '[:upper:]' '[:lower:]')
                if echo "$CT" | grep -q "elf"; then
                  CA=""
                  case "$CT" in
                    *aarch64*|*arm64*)      CA="aarch64" ;;
                    *arm*|*eabi*)           CA="arm" ;;
                    *x86-64*|*x86_64*)     CA="x86_64" ;;
                    *80386*|*i386*|*i686*)  CA="i686" ;;
                  esac
                  { [ -z "$CA" ] || [ "$CA" = "$ARCH" ]; } && BIN="$c" && break
                else
                  BIN="$c" && break
                fi
              done < <(find "$TERMUX_PKG_SRCDIR" -maxdepth 4 -type f \
                \( -name "$pkg" -o -name "${pkg}.sh" -o -name "${pkg}.py" \
                   -o -name "${pkg}.js" -o -name "${pkg}-${ARCH}" \) 2>/dev/null)

              if [ -z "$BIN" ]; then
                while IFS= read -r c; do
                  CT=$(file -b "$c" | tr '[:upper:]' '[:lower:]')
                  if echo "$CT" | grep -q "elf"; then
                    CA=""
                    case "$CT" in
                      *aarch64*|*arm64*)      CA="aarch64" ;;
                      *arm*|*eabi*)           CA="arm" ;;
                      *x86-64*|*x86_64*)     CA="x86_64" ;;
                      *80386*|*i386*|*i686*)  CA="i686" ;;
                    esac
                    { [ -z "$CA" ] || [ "$CA" = "$ARCH" ]; } && BIN="$c" && break
                  fi
                done < <(find "$TERMUX_PKG_SRCDIR" -maxdepth 4 -type f -perm /111 2>/dev/null)
              fi

              if [ -z "$BIN" ]; then
                while IFS= read -r c; do
                  BIN="$c" && break
                done < <(find "$TERMUX_PKG_SRCDIR" -maxdepth 4 -type f \
                  \( -name "main.py" -o -name "main.sh" -o -name "main.js" \
                     -o -name "index.js" -o -name "${pkg}.py" \
                     -o -name "${pkg}.sh" \) 2>/dev/null)
              fi

              if [ -n "$BIN" ]; then
                SCRIPT_NAME=$(basename "$BIN")
                PKG_SHARE="$TERMUX_PREFIX/share/$pkg"
                mkdir -p "$PKG_SHARE"

                find "$TERMUX_PKG_SRCDIR" -maxdepth 6 -type f | while IFS= read -r sf; do
                  rp="${sf#$TERMUX_PKG_SRCDIR/}"
                  dd_="$PKG_SHARE/$(dirname "$rp")"
                  mkdir -p "$dd_"
                  cp "$sf" "$dd_/" 2>/dev/null || true
                done

                BT=$(file -b "$BIN" | tr '[:upper:]' '[:lower:]')
                if echo "$BT" | grep -q "elf"; then
                  cp "$BIN" "$TERMUX_PREFIX/bin/$pkg"
                  chmod +x "$TERMUX_PREFIX/bin/$pkg"
                  HAS_BINARY=true
                  echo "  Fallback: ELF binary installed"
                else
                  WR="$TERMUX_PREFIX/bin/$pkg"
                  case "$SCRIPT_NAME" in
                    *.py)
                      printf '%s\n' \
                        '#!/data/data/com.termux/files/usr/bin/python3' \
                        'import sys, os' \
                        '_d = os.path.dirname(os.path.realpath(__file__))' \
                        "_s = os.path.join(_d, '..', 'share', '$pkg')" \
                        'os.chdir(_s); sys.path.insert(0, _s)' \
                        "exec(open(os.path.join(_s, '$SCRIPT_NAME')).read())" \
                        > "$WR"
                      ;;
                    *.js)
                      printf '%s\n' \
                        '#!/data/data/com.termux/files/usr/bin/bash' \
                        '_d="$(cd "$(dirname "$(readlink -f "$0")")" && pwd)"' \
                        "exec node \"\$_d/../share/$pkg/$SCRIPT_NAME\" \"\$@\"" \
                        > "$WR"
                      ;;
                    *)
                      printf '%s\n' \
                        '#!/data/data/com.termux/files/usr/bin/bash' \
                        '_d="$(cd "$(dirname "$(readlink -f "$0")")" && pwd)"' \
                        "cd \"\$_d/../share/$pkg\" || exit 1" \
                        "exec bash '$SCRIPT_NAME' \"\$@\"" \
                        > "$WR"
                      ;;
                  esac
                  chmod +x "$WR"
                  HAS_BINARY=true
                  echo "  Fallback: wrapper created -> share/$pkg/$SCRIPT_NAME"
                fi
              else
                echo "  WARNING: No entry point found for $pkg [$ARCH]"
              fi
            fi

            if [ "$HAS_BINARY" = "false" ] \
               && [ -z "$(find "$PKG_BUILD/data" -type f 2>/dev/null)" ]; then
              echo "  SKIP: No installable content for $pkg [$ARCH]"
              rm -rf "$PKG_BUILD" "$TERMUX_PKG_SRCDIR"
              continue
            fi

            PKG_DESC="${TERMUX_PKG_DESCRIPTION:-$pkg}"
            PKG_HOMEPAGE="${TERMUX_PKG_HOMEPAGE:-https://github.com/djunekz/termux-app-store}"
            PKG_LICENSE="${TERMUX_PKG_LICENSE:-unknown}"
            PKG_MAINTAINER="${TERMUX_PKG_MAINTAINER:-@termux-app-store}"
            PKG_DEPENDS="${TERMUX_PKG_DEPENDS:-}"
            PKG_DEPENDS=$(echo "$PKG_DEPENDS" | \
              sed 's/binutils-is-llvm[^,]*,\?//g; s/,\s*,/,/g; s/^,\|,$//g' | \
              sed 's/^[[:space:]]*//; s/[[:space:]]*$//')

            INSTALLED_SIZE=$(du -sk "$PKG_BUILD/data" 2>/dev/null | cut -f1 || echo "1")

            {
              printf 'Package: %s\n'        "$pkg"
              printf 'Version: %s\n'        "$VERSION"
              printf 'Architecture: %s\n'   "$DEB_ARCH"
              printf 'Maintainer: %s\n'     "$PKG_MAINTAINER"
              printf 'Installed-Size: %s\n' "$INSTALLED_SIZE"
              printf 'Homepage: %s\n'       "$PKG_HOMEPAGE"
              printf 'Description: %s\n'    "$PKG_DESC"
            } > "$PKG_BUILD/DEBIAN/control"
            [ -n "$PKG_DEPENDS" ] && echo "Depends: $PKG_DEPENDS" >> "$PKG_BUILD/DEBIAN/control"

            DEB_OUT="output/${pkg}_${VERSION}_${DEB_ARCH}.deb"
            if dpkg-deb --build "$PKG_BUILD" "$DEB_OUT" 2>/dev/null; then
              SIZE=$(du -h "$DEB_OUT" | cut -f1)
              echo "  OK: $(basename "$DEB_OUT") ($SIZE)"
            else
              echo "  ERROR: dpkg-deb failed for $pkg [$ARCH]"
            fi

            rm -rf "$TERMUX_PKG_SRCDIR"
          done

          echo ""
          echo "Total .deb built for $ARCH: $(ls output/*.deb 2>/dev/null | wc -l)"

      - name: Upload artifact for ${{ matrix.arch }}
        uses: actions/upload-artifact@v4
        with:
          name: debs-${{ matrix.arch }}
          path: output/*.deb
          if-no-files-found: warn
          retention-days: 7

  publish-repo:
    needs: build-debs
    runs-on: ubuntu-latest
    steps:
      - name: Install tools
        run: sudo apt-get install -y dpkg-dev

      - name: Checkout source (to read packages/ metadata)
        uses: actions/checkout@v4
        with:
          ref: master
          path: source

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Initialize gh-pages if it does not exist
        run: |
          if [ ! -d "gh-pages/.git" ]; then
            mkdir -p gh-pages
            cd gh-pages
            git init
            git remote add origin \
              "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            git checkout --orphan gh-pages
          fi
          for arch in aarch64 arm x86_64 i686; do
            mkdir -p "gh-pages/dists/termux/main/binary-${arch}"
          done
          mkdir -p gh-pages/pool/main

      - name: Download all arch artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: debs-*
          path: all-debs/
          merge-multiple: true

      - name: Copy .deb files to pool
        run: |
          for new_deb in all-debs/*.deb; do
            [ -f "$new_deb" ] || continue
            pkgname=$(basename "$new_deb" | cut -d'_' -f1)
            rm -f "gh-pages/pool/main/${pkgname}_"*.deb 2>/dev/null || true
          done
          cp all-debs/*.deb gh-pages/pool/main/ 2>/dev/null || true
          echo "Files in pool/main ($(ls gh-pages/pool/main/*.deb 2>/dev/null | wc -l) files):"
          ls gh-pages/pool/main/

      - name: Generate Packages index per architecture
        run: |
          cd gh-pages
          FULL_PKG="/tmp/Packages_all"
          if ls pool/main/*.deb >/dev/null 2>&1; then
            dpkg-scanpackages pool/main /dev/null 2>/dev/null \
              | sed 's|^Filename: pool/main/pool/main/|Filename: pool/main/|' \
              > "$FULL_PKG"
          else
            touch "$FULL_PKG"
          fi

          for arch in aarch64 arm x86_64 i686; do
            PKGDIR="dists/termux/main/binary-${arch}"
            mkdir -p "$PKGDIR"

            awk -v arch="$arch" '
              /^$/ { if (keep) { printf "%s\n", block; } block=""; keep=0; next }
              /^Architecture:/ {
                if ($2 == arch || $2 == "all") keep=1
              }
              { block = block $0 "\n" }
              END { if (keep && block != "") printf "%s\n", block }
            ' "$FULL_PKG" > "$PKGDIR/Packages"

            rm -f "$PKGDIR/Packages.gz"
            gzip -k "$PKGDIR/Packages"
            COUNT=$(grep -c "^Package:" "$PKGDIR/Packages" 2>/dev/null || echo 0)
            echo "  [$arch] $COUNT packages indexed"
          done
          rm -f "$FULL_PKG"

      - name: Generate Release file
        run: |
          cd gh-pages
          {
            printf 'Origin: Termux App Store\n'
            printf 'Label: Termux App Store\n'
            printf 'Suite: termux\n'
            printf 'Codename: termux\n'
            printf 'Components: main\n'
            printf 'Architectures: aarch64 arm x86_64 i686\n'
            printf 'Description: Custom Termux repository by @djunekz\n'
            printf 'Date: %s\n' "$(date -u '+%a, %d %b %Y %H:%M:%S UTC')"
          } > dists/termux/Release

          cd dists/termux
          for algo in MD5Sum SHA256; do
            echo "$algo:" >> Release
            for arch in aarch64 arm x86_64 i686; do
              for f in "main/binary-${arch}/Packages" "main/binary-${arch}/Packages.gz"; do
                [ -f "$f" ] || continue
                SIZE=$(wc -c < "$f")
                if [ "$algo" = "MD5Sum" ]; then
                  HASH=$(md5sum "$f" | cut -d' ' -f1)
                else
                  HASH=$(sha256sum "$f" | cut -d' ' -f1)
                fi
                echo " $HASH $SIZE $f" >> Release
              done
            done
          done

      - name: Copy install-repo.py to gh-pages
        run: |
          cp source/install-repo.py gh-pages/install-repo.py

      - name: Write index generator script
        run: |
          cat > /tmp/gen_index.py << 'ENDOFSCRIPT'
          import sys
          total = sys.argv[1]
          pkg_rows = sys.argv[2]
          last_updated = sys.argv[3]
          print(f"""<!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Termux App Store</title>
          <style>
          *{{box-sizing:border-box;margin:0;padding:0}}
          body{{font-family:'Courier New',monospace;background:#0d1117;color:#c9d1d9;padding:24px 16px;line-height:1.6}}
          .wrap{{max-width:760px;margin:0 auto}}
          h1{{color:#58a6ff;font-size:22px;margin-bottom:4px}}
          .sub{{color:#8b949e;font-size:13px;margin-bottom:24px}}
          h2{{color:#79c0ff;font-size:12px;font-weight:bold;margin:28px 0 8px;text-transform:uppercase;letter-spacing:.08em}}
          pre{{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;overflow-x:auto;font-size:13px}}
          code{{color:#7ee787}}
          a{{color:#58a6ff;text-decoration:none}}
          a:hover{{text-decoration:underline}}
          table{{width:100%;border-collapse:collapse;font-size:13px;margin-top:4px}}
          th{{text-align:left;padding:6px 12px;color:#8b949e;border-bottom:1px solid #21262d;font-weight:normal}}
          td{{padding:5px 12px;border-bottom:1px solid #161b22}}
          td:first-child{{color:#7ee787}}
          td:nth-child(2){{color:#e3b341;min-width:80px}}
          td:nth-child(3){{color:#8b949e}}
          tr:hover td{{background:#161b22}}
          .badges{{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px}}
          .badge{{background:#1f6feb22;color:#58a6ff;border:1px solid #1f6feb55;font-size:11px;padding:2px 10px;border-radius:12px}}
          .badge.green{{background:#23863622;color:#3fb950;border-color:#23863655}}
          footer{{margin-top:48px;color:#484f58;font-size:12px;border-top:1px solid #21262d;padding-top:16px}}
          </style>
          </head>
          <body>
          <div class="wrap">
          <h1>Termux App Store</h1>
          <p class="sub">by <a href="https://github.com/djunekz">@djunekz</a> &nbsp;&middot;&nbsp;
            <a href="https://github.com/djunekz/termux-app-store">GitHub</a></p>
          <div class="badges">
            <span class="badge green">{total} packages</span>
            <span class="badge">aarch64</span><span class="badge">arm</span>
            <span class="badge">x86_64</span><span class="badge">i686</span>
          </div>
          <h2>Quick Setup</h2>
          <pre><code>curl -fsSL https://djunekz.github.io/termux-app-store/install-repo.py | python</code></pre>
          <h2>Available packages ({total})</h2>
          <table>
          <thead><tr><th>Package</th><th>Version</th><th>Description</th></tr></thead>
          <tbody>{pkg_rows}</tbody>
          </table>
          <h2>Repository links</h2>
          <pre><code>dists/termux/main/binary-aarch64/Packages
          dists/termux/main/binary-arm/Packages
          dists/termux/main/binary-x86_64/Packages
          dists/termux/main/binary-i686/Packages</code></pre>
          <footer>Last updated: {last_updated}</footer>
          </div></body></html>""")
          ENDOFSCRIPT

      - name: Collect package rows for index
        id: pkgrows
        run: |
          PKG_ROWS=""
          for pkg_dir in source/packages/*/; do
            pkg=$(basename "$pkg_dir")
            unset TERMUX_PKG_VERSION TERMUX_PKG_DESCRIPTION 2>/dev/null || true
            eval "$(grep '^TERMUX_PKG_VERSION\|^TERMUX_PKG_DESCRIPTION' "$pkg_dir/build.sh" 2>/dev/null || true)"
            V="${TERMUX_PKG_VERSION:-}"
            D="${TERMUX_PKG_DESCRIPTION:-}"
            PKG_ROWS+="<tr><td>${pkg}</td><td>${V}</td><td>${D}</td></tr>"
          done
          echo "rows=${PKG_ROWS}" >> "$GITHUB_OUTPUT"

      - name: Generate index.html
        env:
          PKG_ROWS: ${{ steps.pkgrows.outputs.rows }}
        run: |
          cd gh-pages
          TOTAL=$(grep -c "^Package:" dists/termux/main/binary-aarch64/Packages 2>/dev/null || echo 0)
          LAST_UPDATED=$(date -u '+%Y-%m-%d %H:%M UTC')
          python3 /tmp/gen_index.py "$TOTAL" "$PKG_ROWS" "$LAST_UPDATED" > index.html

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages
          git config user.email "258516621+termux-app-store@users.noreply.github.com"
          git config user.name "Termux App Store"
          git add -A
          TOTAL=$(grep -c "^Package:" dists/termux/main/binary-aarch64/Packages 2>/dev/null || echo 0)
          if git rev-parse HEAD >/dev/null 2>&1; then
            if git diff --staged --quiet; then
              echo "No changes to commit"
            else
              git commit -m "repo: $TOTAL pkgs, multi-arch [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
              git push origin HEAD:gh-pages
            fi
          else
            git commit -m "repo: $TOTAL pkgs, multi-arch [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
            git push origin HEAD:gh-pages
          fi
