name: 🐞 Bug Report
description: Report a bug or error in Termux App Store.
title: "[BUG] "
labels: [bug]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug!
        Please fill in all fields below so we can investigate quickly.

  - type: input
    id: description
    attributes:
      label: Bug Description
      placeholder: "Example: Termux App Store crashes when selecting a package"
    validations:
      required: true

  - type: input
    id: package_feature
    attributes:
      label: Related Package / Feature
      placeholder: "Example: Package installation, search, list panel, etc."
    validations:
      required: true

  - type: dropdown
    id: termux_version
    attributes:
      label: Termux Version
      options:
        - "0.144"
        - "0.145"
        - "Other"
    validations:
      required: true

  - type: input
    id: android_version
    attributes:
      label: Android Version
      placeholder: "Example: 12"
    validations:
      required: true

  - type: dropdown
    id: architecture
    attributes:
      label: Device Architecture
      options:
        - aarch64
        - armv7l
        - x86_64
        - Other
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: Termux App Store Version
      placeholder: "Example: 1.0.5"
    validations:
      required: true

  - type: textarea
    id: reproduction_steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Open Termux App Store
        2. Select package "abc"
        3. Click Install / Update
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
