name: "✨ Feature Request"
description: "Suggest a new idea or feature for Termux App Store."
title: "[FEATURE] "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a new feature!
        Please fill out the details below so we can better understand your idea.

  - type: input
    id: feature_title
    attributes:
      label: "Feature Title"
      placeholder: "Example: Add package auto-update system"
    validations:
      required: true

  - type: textarea
    id: feature_description
    attributes:
      label: "Feature Description"
      placeholder: "Describe the feature or improvement in detail"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "Priority"
      options:
        - "High"
        - "Medium"
        - "Low"
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: "Use Case / Example"
      placeholder: "Explain how this feature would be used"

  - type: textarea
    id: additional_context
    attributes:
      label: "Additional Context"
      placeholder: "Add any extra information, references, or screenshots"

  - type: input
    id: termux_version
    attributes:
      label: "Termux Version"
      placeholder: "Example: 0.145"

  - type: input
    id: android_version
    attributes:
      label: "Android Version"
      placeholder: "Example: 12"
