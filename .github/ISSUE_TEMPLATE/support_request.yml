name: "🆘 Support / Help Request"
description: "Ask questions or request help related to Termux App Store."
title: "[HELP] "
labels: ["question"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reaching out for help!
        Please provide as much detail as possible so we can assist you effectively.

  - type: input
    id: issue_title
    attributes:
      label: "Issue / Question Title"
      placeholder: "Example: Unable to install package xyz"
    validations:
      required: true

  - type: textarea
    id: issue_description
    attributes:
      label: "Issue Description / Question"
      placeholder: "Describe your issue or question in detail"
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: "Steps to Reproduce (If Any)"
      placeholder: |
        1. Open Termux App Store
        2. Run command xyz
        3. See error
       
  - type: textarea
    id: expected_behavior
    attributes:
      label: "Expected Behavior"
      placeholder: "What did you expect to happen?"

  - type: textarea
    id: actual_behavior
    attributes:
      label: "Actual Behavior"
      placeholder: "What actually happened?"

  - type: input
    id: termux_version
    attributes:
      label: "Termux Version"
      placeholder: "Example: 0.145"

  - type: input
    id: android_version
    attributes:
      label: "Android Version"
      placeholder: "Example: 12"
